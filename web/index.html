<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta
      name="description"
      content="Tournament Manager"
    />
    <!-- viewport-fit=cover handles iPhone notch/safe-area; the
         maximum-scale + user-scalable=no pair stops mobile Safari
         from auto-zooming the layout when an input is focused. -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <!-- V5 brand fonts. Alfa Slab One (display) + Anton (UI heading) +
         IBM Plex Mono (label/crumb) + Inter (body). Preconnect first so
         the CSS request can reuse the warm TLS connection. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&family=Anton&family=IBM+Plex+Mono:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap"
    />
    <title>bert &amp; erne — pickleball tournaments</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
