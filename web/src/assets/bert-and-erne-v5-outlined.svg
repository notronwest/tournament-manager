  <title
     id="title1">bert &amp; erne — V5 (round 9) — outlined paths, no font dependency</title>
  <desc
     id="desc1">
    ──────────────────────────────────────────────────────────────────
    bert &amp; erne — logo lockup, round 9 / V5
    &quot;Geometric and dark&quot; — square ink stamp + cream bookends.

    ★ OUTLINED VERSION: all text has been converted to SVG paths.
      No font installation required. Fully portable.
      Text is no longer editable as type — to change words you'd need
      to regenerate from the source HTML / opentype.js script.
    ──────────────────────────────────────────────────────────────────
    Source fonts (only needed if you want to regenerate paths):
      • Alfa Slab One  https://fonts.google.com/specimen/Alfa+Slab+One
      • Anton          https://fonts.google.com/specimen/Anton
    ──────────────────────────────────────────────────────────────────
    COLOR TOKENS
      ink           #14181f
      bg / off-white #fafaf7
      cream         #f6efd6
      court-green   #2c8a3d
      court-yellow  #f3d111
      court-red     #d8341c
    ──────────────────────────────────────────────────────────────────
    LAYER MAP (back-to-front)
      1. Ink frame    (the black border / scaffolding)
      2. BERT block   (green + kitchen + outlined &quot;BERT&quot;)
      3. Net block    (yellow + net line + outlined &quot;&amp;&quot;)
      4. ERNE block   (green + kitchen + outlined &quot;ERNE&quot;)
      5. Tag row      (cream bookends + outlined tagline)
      6. Stamp        (ink square + yellow bracket, rotated +8°)
    ──────────────────────────────────────────────────────────────────
  </desc>
