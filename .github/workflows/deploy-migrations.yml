name: Deploy migrations

# STRUCTURAL guardrail against schema drift: prod migrations are applied ONLY
# here, by CI, from `main` — never `supabase db push` from a laptop. Because CI
# can only apply what's committed, "applied to prod but not in the repo" becomes
# impossible through the normal flow. (The drift alarm catches the other door:
# someone editing schema by hand in the Supabase dashboard.)
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   SUPABASE_ACCESS_TOKEN  — a Supabase personal access token
#   SUPABASE_DB_PASSWORD   — the project's database password
#   SUPABASE_PROJECT_REF   — the remote project ref (NOT the local config name)
#
# Optional manual gate: this job targets the `production` environment. Add
# "required reviewers" to that environment in repo settings and every prod apply
# pauses for a one-click approval.

on:
  push:
    branches: [main]
    paths: ["supabase/migrations/**"]
  workflow_dispatch:

concurrency:
  group: deploy-migrations
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Apply committed migrations to prod
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          set -euo pipefail
          supabase link --project-ref "$SUPABASE_PROJECT_REF"
          # Each migration runs in its own transaction — a bad one rolls back.
          # If this fails with "Remote migration versions not found", the DB has
          # drift that must be reconciled (supabase db pull) before any deploy.
          supabase db push
