name: Apply DB migrations (on merge)

# Migrations are CODE: drafted in a PR, reviewed by Ron, and applied HERE on
# merge to main — never by an interactive session or a hand-run `db push`
# (that caused drift). See supabase/MIGRATIONS.md + the WMPC migration
# convention (../wmpc-meta/conventions/migrations.md).
#
# FAIL-CLOSED / INERT: if the Supabase secrets aren't set, this exits green
# doing nothing. Turning it on requires (1) a reconciled drift baseline and
# (2) the secrets below — see supabase/MIGRATIONS.md. Never enable on a
# drifted database.

on:
  push:
    branches: [main]
    paths: ["supabase/migrations/**"]
  workflow_dispatch: {}

concurrency:
  group: db-migrate-${{ github.ref }}
  cancel-in-progress: false   # never interrupt a half-applied migration

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Are migration secrets configured?
        id: cfg
        env:
          TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PWD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          if [ -n "$TOKEN" ] && [ -n "$PWD" ] && [ -n "$REF" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Migration secrets not set — skipping apply (expected until the pipeline is turned on; see supabase/MIGRATIONS.md)."
          fi

      - uses: supabase/setup-cli@v1
        if: steps.cfg.outputs.ready == 'true'
        with: { version: latest }

      - name: Apply pending migrations
        if: steps.cfg.outputs.ready == 'true'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase link --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}" --password "${{ secrets.SUPABASE_DB_PASSWORD }}"
          # Plain `db push` (NOT --include-all): apply only migrations the remote
          # history hasn't recorded, in order, respecting that history.
          #
          # We TRIED --include-all (2026-06-10) to survive an out-of-order merge
          # (feedback_submissions). It backfired: once the history was out of
          # order, --include-all RE-APPLIED already-recorded migrations, hitting
          # `schema_migrations` duplicate-key errors and wedging the pipeline
          # (2026-06-11, the refund-engine merge). The flag forces re-application
          # of versions already in the history — wrong for steady state.
          #
          # Out-of-order protection now comes from DISCIPLINE, not the flag:
          # merge DB PRs in migration-timestamp order (see supabase/MIGRATIONS.md)
          # and write idempotent DDL (`if not exists`, `create or replace`,
          # `drop ... if exists`). A genuine out-of-order merge fails closed
          # (Discord alert) → renumber the file or `supabase migration repair`.
          supabase db push --password "${{ secrets.SUPABASE_DB_PASSWORD }}"

      - name: Alert on failure (fail-closed)
        if: failure() && steps.cfg.outputs.ready == 'true'
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          [ -n "$DISCORD_WEBHOOK" ] || exit 0
          msg="❌ DB migration FAILED on merge to main (${{ github.repository }}). Schema may be partially applied — check before further merges. ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -s -X POST -H "Content-Type: application/json" -d "$(jq -Rn --arg m "$msg" '{content:$m}')" "$DISCORD_WEBHOOK" || true
