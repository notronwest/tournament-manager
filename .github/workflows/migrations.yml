name: Apply DB migrations (test on main, prod on production)

# Migrations are CODE: drafted in a PR, reviewed by Ron, applied HERE.
#   push to `main`        â†’ TEST Supabase project
#   push to `production`  â†’ PROD Supabase project (the deliberate promotion)
# Promote testâ†’prod by merging `main` â†’ `production`. Never hand-run `db push`
# (that caused drift). See supabase/MIGRATIONS.md + the WMPC migration
# convention (../wmpc-meta/conventions/migrations.md).
#
# FAIL-CLOSED / INERT: if the TARGET's secrets aren't set, this exits green
# doing nothing â€” so `main`â†’test stays inert until TEST_SUPABASE_PROJECT_REF +
# TEST_SUPABASE_DB_PASSWORD are added. The Supabase ACCESS_TOKEN is account-
# level (one token covers both projects).

on:
  push:
    branches: [main, production]
    paths: ["supabase/migrations/**"]
  workflow_dispatch: {}

concurrency:
  group: db-migrate-${{ github.ref }}
  cancel-in-progress: false   # never interrupt a half-applied migration

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve target (PROD on production branch, TEST otherwise)
        id: cfg
        env:
          TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PROD_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          PROD_PWD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          TEST_REF: ${{ secrets.TEST_SUPABASE_PROJECT_REF }}
          TEST_PWD: ${{ secrets.TEST_SUPABASE_DB_PASSWORD }}
        run: |
          if [ "$GITHUB_REF" = "refs/heads/production" ]; then
            ENV=PROD; REF="$PROD_REF"; PW="$PROD_PWD"
          else
            ENV=TEST; REF="$TEST_REF"; PW="$TEST_PWD"
          fi
          echo "env=$ENV" >> "$GITHUB_OUTPUT"
          echo "ref=$REF" >> "$GITHUB_OUTPUT"
          if [ -n "$TOKEN" ] && [ -n "$REF" ] && [ -n "$PW" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
            echo "::add-mask::$PW"
            echo "TARGET_PWD=$PW" >> "$GITHUB_ENV"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::$ENV migration secrets not set â€” skipping apply (inert)."
          fi

      - uses: supabase/setup-cli@v1
        if: steps.cfg.outputs.ready == 'true'
        with: { version: latest }

      - name: Apply pending migrations to ${{ steps.cfg.outputs.env }}
        if: steps.cfg.outputs.ready == 'true'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          echo "Applying migrations to ${{ steps.cfg.outputs.env }} (${{ steps.cfg.outputs.ref }})"
          supabase link --project-ref "${{ steps.cfg.outputs.ref }}" --password "$TARGET_PWD"
          # Plain `db push` (NOT --include-all): apply only migrations the remote
          # history hasn't recorded, in order, respecting that history.
          #
          # We TRIED --include-all (2026-06-10) to survive an out-of-order merge
          # (feedback_submissions). It backfired: once the history was out of
          # order, --include-all RE-APPLIED already-recorded migrations, hitting
          # `schema_migrations` duplicate-key errors and wedging the pipeline
          # (2026-06-11, the refund-engine merge). The flag forces re-application
          # of versions already in the history â€” wrong for steady state.
          #
          # Out-of-order protection now comes from DISCIPLINE, not the flag:
          # merge DB PRs in migration-timestamp order (see supabase/MIGRATIONS.md)
          # and write idempotent DDL (`if not exists`, `create or replace`,
          # `drop ... if exists`). A genuine out-of-order merge fails closed
          # (Discord alert) â†’ renumber the file or `supabase migration repair`.
          supabase db push --password "$TARGET_PWD"

      - name: Alert on failure (fail-closed)
        if: failure() && steps.cfg.outputs.ready == 'true'
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          [ -n "$DISCORD_WEBHOOK" ] || exit 0
          msg="âťŚ DB migration FAILED â†’ ${{ steps.cfg.outputs.env }} (${{ github.repository }} @ ${{ github.ref_name }}). Schema may be partially applied â€” check before further merges. ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -s -X POST -H "Content-Type: application/json" -d "$(jq -Rn --arg m "$msg" '{content:$m}')" "$DISCORD_WEBHOOK" || true
