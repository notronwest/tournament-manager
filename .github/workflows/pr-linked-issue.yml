name: PR links an issue

# Enforces the WMPC convention: every PR references a board issue —
#   `Closes #N`  → the PR COMPLETES that card (it moves to Done on merge)
#   `Part of #N` → prerequisite / partial work that should NOT close a card
#                  (also accepted: Refs #N, Relates to #N)
# No secrets, no checkout — reads the PR body from the event. Always enforced;
# re-runs on body edits, so adding the reference clears it without a new commit.
#
# Canonical copy: wmpc-meta/templates/pr-linked-issue.yml (new repos get it via
# scripts/claude-bootstrap.sh). See wmpc-meta/conventions/backlog.md.

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Require an issue reference in the PR body
        env:
          BODY: ${{ github.event.pull_request.body }}
        run: |
          if printf '%s' "$BODY" | grep -iqE '(close[sd]?|fix(e[sd])?|resolve[sd]?|part of|refs?|relates? to)[[:space:]]+#[0-9]+'; then
            echo "✓ PR references an issue."
          else
            echo "::error::This PR has no issue reference. Add 'Closes #<n>' (completes a card) or 'Part of #<n>' (prerequisite/partial) to the PR description, then re-run. See wmpc-meta/conventions/backlog.md."
            exit 1
          fi
