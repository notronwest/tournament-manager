name: Nightly regression (E2E)

# Acceptance-criteria regression suite — token-free (deterministic Playwright,
# no LLM). Seeds a fixture, runs the suite against the deployed app, posts a
# pass/fail summary to Discord. See web/e2e/README.md.
#
# INERT until configured: if the required secrets aren't set, the job exits
# green doing nothing — no red nightly failures while the test DB is unwired.

on:
  schedule:
    - cron: "15 9 * * *"
  workflow_dispatch: {}

jobs:
  e2e:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - name: Are regression secrets configured?
        id: cfg
        working-directory: .
        env:
          E2E_SUPABASE_URL: ${{ secrets.E2E_SUPABASE_URL }}
          E2E_BASE_URL: ${{ secrets.E2E_BASE_URL }}
          E2E_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.E2E_SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if [ -n "$E2E_SUPABASE_URL" ] && [ -n "$E2E_BASE_URL" ] && [ -n "$E2E_SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Regression secrets not set yet — skipping (expected until the test DB is wired; see web/e2e/README.md)."
          fi

      - uses: actions/setup-node@v4
        if: steps.cfg.outputs.ready == 'true'
        with: { node-version: "20", cache: "npm", cache-dependency-path: web/package-lock.json }
      - run: npm ci
        if: steps.cfg.outputs.ready == 'true'
      - run: npx playwright install --with-deps chromium
        if: steps.cfg.outputs.ready == 'true'

      - name: Seed deterministic test data
        if: steps.cfg.outputs.ready == 'true'
        env:
          E2E_SUPABASE_URL: ${{ secrets.E2E_SUPABASE_URL }}
          E2E_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.E2E_SUPABASE_SERVICE_ROLE_KEY }}
          E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
        run: npx tsx e2e/seed.ts

      - name: Run regression suite
        id: tests
        if: steps.cfg.outputs.ready == 'true'
        env:
          E2E_BASE_URL: ${{ secrets.E2E_BASE_URL }}
          E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
        run: npm run test:e2e

      # Per-test history (B): ingest the JSON report into e2e_test_results in the
      # TEST project. Best-effort — the script never fails the job.
      - name: Record per-test history
        if: always() && steps.cfg.outputs.ready == 'true'
        continue-on-error: true
        env:
          E2E_SUPABASE_URL: ${{ secrets.E2E_SUPABASE_URL }}
          E2E_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.E2E_SUPABASE_SERVICE_ROLE_KEY }}
        run: npx tsx e2e/record-history.ts

      - name: Report to Discord
        if: always() && steps.cfg.outputs.ready == 'true'
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          if [ "${{ steps.tests.outcome }}" = "success" ]; then
            msg="✅ Nightly regression: all acceptance-criteria tests passed."
          else
            msg="❌ Nightly regression FAILED — a previously-fixed behavior may have regressed. ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi
          curl -s -X POST -H "Content-Type: application/json" -d "$(jq -Rn --arg m "$msg" '{content:$m}')" "$DISCORD_WEBHOOK" || true

      # HTML report (A): upload on every run (pass or fail) so each night has a
      # downloadable per-test report — with traces/screenshots on failures.
      - uses: actions/upload-artifact@v4
        if: always() && steps.cfg.outputs.ready == 'true'
        with: { name: playwright-report, path: web/playwright-report/, retention-days: 14 }
