name: Nightly regression (E2E)

# Acceptance-criteria regression suite — token-free (deterministic Playwright,
# no LLM). Seeds a test fixture, runs the suite against the deployed app, and
# posts a one-line pass/fail summary to Discord. See web/e2e/README.md.

on:
  schedule:
    - cron: "15 9 * * *"   # 09:15 UTC nightly
  workflow_dispatch: {}      # manual run button

jobs:
  e2e:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "npm", cache-dependency-path: web/package-lock.json }
      - run: npm install   # not `npm ci`: package-lock not regenerated in the foundation PR
      - run: npx playwright install --with-deps chromium

      - name: Seed deterministic test data
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
        run: npx tsx e2e/seed.ts

      - name: Run regression suite
        id: tests
        env:
          E2E_BASE_URL: ${{ secrets.E2E_BASE_URL }}
          E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
        run: npm run test:e2e

      - name: Report to Discord
        if: always()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          if [ "${{ steps.tests.outcome }}" = "success" ]; then
            msg="✅ Nightly regression: all acceptance-criteria tests passed."
          else
            msg="❌ Nightly regression FAILED — a previously-fixed behavior may have regressed. See the run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi
          curl -s -X POST -H "Content-Type: application/json" \
            -d "$(jq -Rn --arg m "$msg" '{content:$m}')" "$DISCORD_WEBHOOK" || true

      - uses: actions/upload-artifact@v4
        if: failure()
        with: { name: playwright-report, path: web/playwright-report/, retention-days: 7 }
